<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Tripwire — buying-signal radar for SMB sales teams">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0D11"/>
      <stop offset="55%" stop-color="#0E1116"/>
      <stop offset="100%" stop-color="#070809"/>
    </linearGradient>
    <radialGradient id="amberglow" cx="78%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#F4B528" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F4B528" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FB6A8"/>
      <stop offset="70%" stop-color="#3FB6A8"/>
      <stop offset="100%" stop-color="#F4B528"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#amberglow)"/>

  <!-- faint grid -->
  <g stroke="#1B2027" stroke-width="1" opacity="0.6">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="316" x2="1200" y2="316"/>
    <line x1="0" y1="474" x2="1200" y2="474"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- brand mark -->
  <g transform="translate(80,70)">
    <rect width="46" height="46" rx="11" fill="#0E1116" stroke="#262C35" stroke-width="1.5"/>
    <line x1="9" y1="32" x2="22" y2="32" stroke="#3FB6A8" stroke-width="3" stroke-linecap="round"/>
    <path d="M22 32 L28 12 L34 32" fill="none" stroke="#F4B528" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="34" y1="32" x2="37" y2="32" stroke="#E0533D" stroke-width="3" stroke-linecap="round"/>
    <text x="62" y="33" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="600" fill="#EDEFF2" letter-spacing="0.5">Tripwire</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="232" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="20" fill="#F4B528" letter-spacing="4">SIGNAL &#183; THRESHOLD &#183; ALERT</text>

  <!-- headline -->
  <text x="78" y="306" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-size="62" font-weight="600" fill="#EDEFF2" letter-spacing="-1">Quiet until it matters.</text>
  <text x="78" y="378" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-size="62" font-weight="600" letter-spacing="-1"><tspan fill="#9AA3AE">A buying-signal radar for </tspan><tspan fill="#F4B528">every account.</tspan></text>

  <!-- subline -->
  <text x="80" y="446" font-family="'Helvetica Neue',Arial,sans-serif" font-size="25" fill="#9AA3AE">A nightly agent watches your named accounts and pings only when a real trigger trips —</text>
  <text x="80" y="480" font-family="'Helvetica Neue',Arial,sans-serif" font-size="25" fill="#9AA3AE">with the pinned source quote, the timestamp, and a suggested opening line.</text>

  <!-- threshold chart signature -->
  <g transform="translate(80,520)">
    <line x1="0" y1="40" x2="1040" y2="40" stroke="#2A3038" stroke-width="2" stroke-dasharray="3 7"/>
    <text x="1046" y="44" font-family="'JetBrains Mono',monospace" font-size="14" fill="#5B6470">THRESHOLD</text>
    <path d="M0 60 L120 58 L240 62 L360 56 L470 59 L560 30 L640 -8 L720 -52"
          fill="none" stroke="url(#sig)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" filter="url(#soft)"/>
    <path d="M0 60 L120 58 L240 62 L360 56 L470 59 L560 30 L640 -8 L720 -52"
          fill="none" stroke="url(#sig)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="560" cy="30" r="7" fill="#0B0D11" stroke="#F4B528" stroke-width="3"/>
    <g transform="translate(640,-8)">
      <circle r="11" fill="#E0533D"/>
      <circle r="20" fill="none" stroke="#E0533D" stroke-width="2" opacity="0.5"/>
    </g>
    <text x="664" y="-2" font-family="'JetBrains Mono',monospace" font-size="16" font-weight="600" fill="#E0533D">&#9889; TRIPPED</text>
  </g>
</svg>
