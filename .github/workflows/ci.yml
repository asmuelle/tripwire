name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tripwire
          POSTGRES_PASSWORD: tripwire
          POSTGRES_DB: tripwire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tripwire"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://tripwire:tripwire@localhost:5432/tripwire_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Detect bootstrap state
        id: bootstrap
        run: |
          if [ -f package.json ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only scaffold (no package.json) — skipping install and just ci. See DESIGN.md milestone M0."
          fi

      - name: Install dependencies
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run merge gate (just ci)
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: just ci
