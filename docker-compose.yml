# Local Postgres 16 + pgvector for migrations / integration work (DESIGN.md M0).
# M1 unit tests are memory-backed and do NOT require this container.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tripwire-postgres
    environment:
      POSTGRES_USER: tripwire
      POSTGRES_PASSWORD: tripwire
      POSTGRES_DB: tripwire
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tripwire']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tripwire-pgdata:/var/lib/postgresql/data

volumes:
  tripwire-pgdata:
